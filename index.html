<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Info | Sander</title>

    <link rel="stylesheet" href="assets/styles/style.css">
</head>
<body>

    <form>
        <input id="domain">
        <button type="submit">Lookup</button>
    </form>
    
    <script>
        const form = document.querySelector("form");
        const input = document.querySelector("#domain");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const domain = input.value;

            const res = await fetch(`http://localhost:3000/lookup?domain=${domain}`);
            const data = await res.json();

            console.log(data);

            render(data);
        });

        function render(data) {
            let old = document.querySelector("#result");
            if (old) old.remove();

            const div = document.createElement("div");
            div.id = "result";

            div.innerHTML = `
                <h2>${data.domain}</h2>

                <p><b>DNS:</b> ${data.dns.addresses.join(", ")} (${data.dns.time}ms)</p>

                <p><b>HTTP:</b> ${data.http.status} (${data.http.time}ms)</p>
            `;

            document.body.appendChild(div);
        }
    </script>
</body>
</html>
